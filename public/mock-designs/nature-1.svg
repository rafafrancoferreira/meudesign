  <g stroke="#E9C46A" stroke-width="4" stroke-linecap="round" opacity="0.7">
    <line x1="200" y1="68" x2="200" y2="52"/>
    <line x1="240" y1="82" x2="252" y2="70"/>
    <line x1="258" y1="120" x2="274" y2="116"/>
    <line x1="258" y1="160" x2="274" y2="168"/>
    <line x1="240" y1="192" x2="252" y2="204"/>
    <line x1="160" y1="192" x2="148" y2="204"/>
    <line x1="142" y1="160" x2="126" y2="168"/>
    <line x1="142" y1="120" x2="126" y2="116"/>
    <line x1="160" y1="82" x2="148" y2="70"/>
  </g>
  <!-- Mountains -->
  <polygon points="60,330 160,180 260,330" fill="#2D6A4F"/>
  <polygon points="140,330 240,200 340,330" fill="#40916C"/>
  <polygon points="200,330 290,220 380,330" fill="#2D6A4F" opacity="0.8"/>
