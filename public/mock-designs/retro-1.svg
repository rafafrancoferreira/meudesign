<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="transparent"/>
  <!-- Outer badge ring -->
  <circle cx="200" cy="200" r="175" fill="#264653" stroke="#E9C46A" stroke-width="8"/>
  <!-- Sun rays -->
  <g transform="translate(200,200)">
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(30)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(60)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(90)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(120)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(150)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(180)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(210)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(240)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(270)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(300)"/>
    <polygon points="0,-155 12,-120 -12,-120" fill="#E9C46A" transform="rotate(330)"/>
  </g>
  <!-- Sun center -->
  <circle cx="200" cy="200" r="100" fill="#F4A261"/>
  <circle cx="200" cy="200" r="72" fill="#E9C46A"/>
  <!-- Face details (retro sun) -->
  <circle cx="178" cy="190" r="9" fill="#264653"/>
  <circle cx="222" cy="190" r="9" fill="#264653"/>
  <path d="M175 220 Q200 240 225 220" stroke="#264653" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Inner ring -->
  <circle cx="200" cy="200" r="115" fill="none" stroke="#E9C46A" stroke-width="3" stroke-dasharray="8 6"/>
</svg>
