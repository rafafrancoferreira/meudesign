<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="transparent"/>
  <!-- Background -->
  <rect x="20" y="20" width="360" height="360" rx="20" fill="#1A1A2E"/>
  <!-- Sunset sky stripes -->
  <rect x="20" y="20" width="360" height="60" rx="20" fill="#FF6B6B"/>
  <rect x="20" y="80" width="360" height="50" fill="#FF8E53"/>
  <rect x="20" y="130" width="360" height="40" fill="#FFA500"/>
  <rect x="20" y="170" width="360" height="35" fill="#FFD700"/>
  <!-- Sun (half) -->
  <clipPath id="horizon">
    <rect x="20" y="200" width="360" height="220"/>
  </clipPath>
  <circle cx="200" cy="202" r="88" fill="#FFF" clip-path="url(#horizon)" opacity="0.95"/>
  <!-- Ocean waves -->
  <rect x="20" y="200" width="360" height="180" fill="#45B7D1" rx="0"/>
  <path d="M20 220 Q80 210 140 220 Q200 230 260 220 Q320 210 380 220" stroke="#4ECDC4" stroke-width="4" fill="none"/>
  <path d="M20 250 Q90 240 160 250 Q230 260 300 250 Q340 244 380 250" stroke="#4ECDC4" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M20 280 Q100 270 180 280 Q260 290 340 280 Q360 278 380 280" stroke="#4ECDC4" stroke-width="2.5" fill="none" opacity="0.5"/>
  <!-- Sun reflection -->
  <rect x="185" y="202" width="30" height="168" fill="#FFF" opacity="0.15" rx="15"/>
  <!-- Border -->
  <rect x="20" y="20" width="360" height="360" rx="20" fill="none" stroke="#FF6B6B" stroke-width="4"/>
</svg>
