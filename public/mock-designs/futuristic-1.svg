<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="transparent"/>
  <!-- Dark background hex -->
  <polygon points="200,30 360,120 360,280 200,370 40,280 40,120" fill="#0A0A1E"/>
  <!-- Outer glow ring -->
  <polygon points="200,30 360,120 360,280 200,370 40,280 40,120" fill="none" stroke="#00F5FF" stroke-width="2" opacity="0.8"/>
  <polygon points="200,40 350,125 350,275 200,360 50,275 50,125" fill="none" stroke="#00F5FF" stroke-width="1" opacity="0.3"/>
  <!-- Geometric face/mask -->
  <!-- Head outline -->
  <polygon points="200,80 300,140 300,260 200,320 100,260 100,140" fill="#1A1A3E"/>
  <polygon points="200,80 300,140 300,260 200,320 100,260 100,140" fill="none" stroke="#7B2FBE" stroke-width="2"/>
  <!-- Eyes -->
  <polygon points="160,165 190,150 190,185 160,200" fill="#00F5FF"/>
  <polygon points="240,165 210,150 210,185 240,200" fill="#00F5FF"/>
  <!-- Eye glow lines -->
  <line x1="190" y1="167" x2="210" y2="167" stroke="#00F5FF" stroke-width="2" opacity="0.6"/>
  <!-- Nose line -->
  <line x1="200" y1="190" x2="200" y2="230" stroke="#7B2FBE" stroke-width="2"/>
  <!-- Mouth -->
  <line x1="165" y1="255" x2="235" y2="255" stroke="#00F5FF" stroke-width="3"/>
  <line x1="175" y1="265" x2="225" y2="265" stroke="#00F5FF" stroke-width="1.5" opacity="0.5"/>
  <!-- Scan lines -->
  <g stroke="#00F5FF" stroke-width="0.5" opacity="0.15">
    <line x1="40" y1="150" x2="360" y2="150"/>
    <line x1="40" y1="170" x2="360" y2="170"/>
    <line x1="40" y1="190" x2="360" y2="190"/>
    <line x1="40" y1="210" x2="360" y2="210"/>
    <line x1="40" y1="230" x2="360" y2="230"/>
    <line x1="40" y1="250" x2="360" y2="250"/>
    <line x1="40" y1="270" x2="360" y2="270"/>
  </g>
  <!-- Corner data marks -->
  <text x="50" y="48" font-family="monospace" font-size="9" fill="#00F5FF" opacity="0.6">SYS://ONLINE</text>
  <text x="270" y="385" font-family="monospace" font-size="9" fill="#7B2FBE" opacity="0.6">v2.0.47</text>
</svg>
