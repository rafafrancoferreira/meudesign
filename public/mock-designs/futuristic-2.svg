<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="transparent"/>
  <!-- Background -->
  <rect width="400" height="400" fill="#050510"/>
  <!-- Grid lines -->
  <g stroke="#00FF88" stroke-width="0.5" opacity="0.2">
    <line x1="50" y1="0" x2="50" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="350" x2="400" y2="350"/>
  </g>
  <!-- Network connections -->
  <line x1="200" y1="200" x2="100" y2="100" stroke="#00FF88" stroke-width="1.5" opacity="0.7"/>
  <line x1="200" y1="200" x2="300" y2="100" stroke="#00FF88" stroke-width="1.5" opacity="0.7"/>
  <line x1="200" y1="200" x2="300" y2="300" stroke="#00FF88" stroke-width="1.5" opacity="0.7"/>
  <line x1="200" y1="200" x2="100" y2="300" stroke="#00FF88" stroke-width="1.5" opacity="0.7"/>
  <line x1="200" y1="200" x2="50" y2="200" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="200" x2="350" y2="200" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="200" x2="200" y2="50" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="200" x2="200" y2="350" stroke="#00FF88" stroke-width="1" opacity="0.5"/>
  <!-- Secondary connections -->
  <line x1="100" y1="100" x2="300" y2="100" stroke="#00FF88" stroke-width="0.8" opacity="0.4"/>
  <line x1="300" y1="100" x2="300" y2="300" stroke="#00FF88" stroke-width="0.8" opacity="0.4"/>
  <line x1="300" y1="300" x2="100" y2="300" stroke="#00FF88" stroke-width="0.8" opacity="0.4"/>
  <line x1="100" y1="300" x2="100" y2="100" stroke="#00FF88" stroke-width="0.8" opacity="0.4"/>
  <!-- Nodes -->
  <circle cx="200" cy="200" r="16" fill="#00FF88"/>
  <circle cx="200" cy="200" r="8" fill="#050510"/>
  <circle cx="100" cy="100" r="10" fill="#00FF88" opacity="0.9"/>
  <circle cx="300" cy="100" r="10" fill="#00FF88" opacity="0.9"/>
  <circle cx="100" cy="300" r="10" fill="#00FF88" opacity="0.9"/>
  <circle cx="300" cy="300" r="10" fill="#00FF88" opacity="0.9"/>
  <circle cx="50" cy="200" r="6" fill="#00FF88" opacity="0.6"/>
  <circle cx="350" cy="200" r="6" fill="#00FF88" opacity="0.6"/>
  <circle cx="200" cy="50" r="6" fill="#00FF88" opacity="0.6"/>
  <circle cx="200" cy="350" r="6" fill="#00FF88" opacity="0.6"/>
  <!-- Outer ring -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#00FF88" stroke-width="1" opacity="0.3" stroke-dasharray="10 8"/>
</svg>
