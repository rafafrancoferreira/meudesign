<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="transparent"/>
  <!-- Background -->
  <rect width="400" height="400" fill="#03045E"/>
  <!-- Isometric cube grid (top face = light blue, right = mid, left = dark) -->
  <!-- Row 1 -->
  <g transform="translate(100, 60)">
    <!-- Cube 1 -->
    <polygon points="100,0 160,35 160,105 100,70" fill="#0077B6"/>
    <polygon points="100,0 40,35 40,105 100,70" fill="#023E8A"/>
    <polygon points="100,0 160,35 100,70 40,35" fill="#90E0EF"/>
    <!-- Cube 2 -->
    <polygon points="160,35 220,0 220,70 160,105" fill="#0077B6"/>
    <polygon points="160,35 100,0 100,70 160,105" fill="#023E8A" opacity="0"/>
    <polygon points="220,0 280,35 220,70 160,35" fill="#90E0EF"/>
  </g>
  <!-- Row 2 -->
  <g transform="translate(40, 95)">
    <polygon points="100,0 160,35 160,105 100,70" fill="#0077B6"/>
    <polygon points="100,0 40,35 40,105 100,70" fill="#023E8A"/>
    <polygon points="100,0 160,35 100,70 40,35" fill="#90E0EF"/>
    <polygon points="160,35 220,0 220,70 160,105" fill="#0077B6"/>
    <polygon points="220,0 280,35 220,70 160,35" fill="#90E0EF"/>
    <polygon points="220,35 280,0 280,70 220,105" fill="#0077B6"/>
    <polygon points="280,0 340,35 280,70 220,35" fill="#90E0EF"/>
  </g>
  <!-- Row 3 -->
  <g transform="translate(40, 200)">
    <polygon points="100,0 160,35 160,105 100,70" fill="#0077B6"/>
    <polygon points="100,0 40,35 40,105 100,70" fill="#023E8A"/>
    <polygon points="100,0 160,35 100,70 40,35" fill="#90E0EF"/>
    <polygon points="160,35 220,0 220,70 160,105" fill="#0077B6"/>
    <polygon points="220,0 280,35 220,70 160,35" fill="#90E0EF"/>
  </g>
  <!-- Row 4 -->
  <g transform="translate(100, 235)">
    <polygon points="100,0 160,35 160,105 100,70" fill="#0077B6"/>
    <polygon points="100,0 40,35 40,105 100,70" fill="#023E8A"/>
    <polygon points="100,0 160,35 100,70 40,35" fill="#90E0EF"/>
  </g>
  <!-- Accent highlight cube (lime) -->
  <g transform="translate(160, 130)">
    <polygon points="100,0 160,35 160,105 100,70" fill="#00B4D8"/>
    <polygon points="100,0 40,35 40,105 100,70" fill="#0077B6"/>
    <polygon points="100,0 160,35 100,70 40,35" fill="#CAF0F8"/>
  </g>
</svg>
