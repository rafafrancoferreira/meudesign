<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Dark poster with transparent print-zone hole (evenodd) -->
  <!-- Hole coords: x=30 y=30 w=340 h=340 → CSS top:7.5% left:7.5% w:85% h:85% -->
  <path fill-rule="evenodd"
    d="M20 20 L380 20 L380 380 L20 380 Z M30 30 L370 30 L370 370 L30 370 Z"
    fill="#1e1e1e"
  />
  <!-- Outer border -->
  <rect x="20" y="20" width="360" height="360" rx="3" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <!-- Inner mat line -->
  <rect x="30" y="30" width="340" height="340" fill="none" stroke="#374151" stroke-width="0.75"/>
  <!-- Corner alignment marks -->
  <polyline points="20,34 20,20 34,20"    fill="none" stroke="#374151" stroke-width="1"/>
  <polyline points="366,20 380,20 380,34"  fill="none" stroke="#374151" stroke-width="1"/>
  <polyline points="20,366 20,380 34,380"  fill="none" stroke="#374151" stroke-width="1"/>
  <polyline points="366,380 380,380 380,366" fill="none" stroke="#374151" stroke-width="1"/>
</svg>
