<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Outer r=175, Inner hole r=148 → CSS top:13% left:13% w:74% h:74% -->
  <path fill-rule="evenodd"
    d="M200 25 A175 175 0 1 0 200.001 25 Z M200 52 A148 148 0 1 0 200.001 52 Z"
    fill="#1f2937"
  />
  <!-- Outer border -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#9ca3af" stroke-width="2"/>
  <!-- Inner ring guide -->
  <circle cx="200" cy="200" r="148" fill="none" stroke="#6b7280" stroke-width="1" stroke-dasharray="4 6"/>
  <!-- Peel notch -->
  <path d="M195 26 L200 18 L205 26" fill="#6b7280" stroke="#6b7280" stroke-width="0.8"/>
</svg>
