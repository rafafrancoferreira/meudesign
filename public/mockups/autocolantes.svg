<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Dark ring with transparent center hole (evenodd) -->
  <!-- Outer r=175, Inner hole r=148 → CSS top:13% left:13% w:74% h:74% shape:circle -->
  <path fill-rule="evenodd"
    d="M200 25 A175 175 0 1 0 200.001 25 Z M200 52 A148 148 0 1 0 200.001 52 Z"
    fill="#1e1e1e"
  />
  <!-- Outer border -->
  <circle cx="200" cy="200" r="175" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <!-- Inner ring guide -->
  <circle cx="200" cy="200" r="148" fill="none" stroke="#374151" stroke-width="0.75" stroke-dasharray="4 6"/>
  <!-- Peel notch -->
  <path d="M195 26 L200 18 L205 26" fill="#374151" stroke="#374151" stroke-width="0.8"/>
</svg>
