<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Hole: x=50 y=50 w=300 h=300 → CSS top:12.5% left:12.5% w:75% h:75% -->
  <path fill-rule="evenodd"
    d="M18 18 L382 18 L382 382 L18 382 Z M50 50 L350 50 L350 350 L50 350 Z"
    fill="#1f2937"
  />

  <!-- Frame outer border -->
  <rect x="18" y="18" width="364" height="364" rx="4" fill="none" stroke="#9ca3af" stroke-width="2"/>

  <!-- Frame inner shadow line -->
  <rect x="44" y="44" width="312" height="312" rx="1" fill="none" stroke="#6b7280" stroke-width="2"/>

  <!-- Canvas inner border -->
  <rect x="50" y="50" width="300" height="300" fill="none" stroke="#6b7280" stroke-width="1"/>

  <!-- Corner joints -->
  <rect x="18"  y="18"  width="32" height="32" rx="2" fill="#374151" stroke="#6b7280" stroke-width="1.2"/>
  <rect x="350" y="18"  width="32" height="32" rx="2" fill="#374151" stroke="#6b7280" stroke-width="1.2"/>
  <rect x="18"  y="350" width="32" height="32" rx="2" fill="#374151" stroke="#6b7280" stroke-width="1.2"/>
  <rect x="350" y="350" width="32" height="32" rx="2" fill="#374151" stroke="#6b7280" stroke-width="1.2"/>

  <!-- Hanging hook -->
  <path d="M180 24 L200 14 L220 24" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
