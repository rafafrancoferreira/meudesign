<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <filter id="qd-sh" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="qd-wood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#e2d9c8"/>
      <stop offset="40%"  stop-color="#d9cfbc"/>
      <stop offset="100%" stop-color="#cfc3ae"/>
    </linearGradient>
  </defs>

  <!-- Wooden frame ring (evenodd: outer - inner canvas hole) + shadow -->
  <!-- Hole coords: x=50 y=50 w=300 h=300 → CSS top:12.5% left:12.5% w:75% h:75% -->
  <path fill-rule="evenodd"
    d="M18 18 L382 18 L382 382 L18 382 Z M50 50 L350 50 L350 350 L50 350 Z"
    fill="url(#qd-wood)" filter="url(#qd-sh)"
  />

  <!-- Frame outer border -->
  <rect x="18" y="18" width="364" height="364" rx="4" fill="none" stroke="#b8a98e" stroke-width="2"/>

  <!-- Frame inner shadow line -->
  <rect x="44" y="44" width="312" height="312" rx="1" fill="none" stroke="#c4b89e" stroke-width="1.5"/>

  <!-- Canvas inner border -->
  <rect x="50" y="50" width="300" height="300" fill="none" stroke="#e8e0d0" stroke-width="0.75"/>

  <!-- Corner joints (decorative) -->
  <rect x="18" y="18"  width="32" height="32" rx="2" fill="#c4b89e" stroke="#b8a98e" stroke-width="1"/>
  <rect x="350" y="18"  width="32" height="32" rx="2" fill="#c4b89e" stroke="#b8a98e" stroke-width="1"/>
  <rect x="18" y="350"  width="32" height="32" rx="2" fill="#c4b89e" stroke="#b8a98e" stroke-width="1"/>
  <rect x="350" y="350" width="32" height="32" rx="2" fill="#c4b89e" stroke="#b8a98e" stroke-width="1"/>

  <!-- Hanging hook hint at top -->
  <path d="M180 24 L200 14 L220 24" fill="none" stroke="#b8a98e" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
